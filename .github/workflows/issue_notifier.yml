name: Issue Notifier / Issue通知

on:
  issues:
    types: [opened]

jobs:
  auto-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Add triage label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['triage']
            })

  notify-discord:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
    steps:
      - name: Check if secret exists
        id: check_secret
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "has_secret=false" >> $GITHUB_OUTPUT
          else
            echo "has_secret=true" >> $GITHUB_OUTPUT
          fi
      - name: Discord notification
        if: steps.check_secret.outputs.has_secret == 'true'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: "🚨 新しいIssueが作成されました: **${{ github.event.issue.title }}**\n${{ github.event.issue.html_url }}"

  notify-slack:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Check if secret exists
        id: check_secret
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "has_secret=false" >> $GITHUB_OUTPUT
          else
            echo "has_secret=true" >> $GITHUB_OUTPUT
          fi
      - name: Slack Notification
        if: steps.check_secret.outputs.has_secret == 'true'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "🚨 新しいIssueが作成されました: <${{ github.event.issue.html_url }}|#${{ github.event.issue.number }} ${{ github.event.issue.title }}>"
            }
        env:
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
