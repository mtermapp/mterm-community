name: Feature Request / 機能要望
description: Suggest an idea for this project / プロジェクトへのアイデアを提案する
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your feature request! / 機能要望ありがとうございます！
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? / 何らかの課題に関連する要望ですか？
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...] / 例: 〜する時にいつも不便に感じている、など
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like / 希望する解決策
      description: A clear and concise description of what you want to happen. / どのようになってほしいか、明確で簡潔に記載してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered / 代替案
      description: A clear and concise description of any alternative solutions or features you've considered. / 検討した代替の解決策や機能があれば記載してください。
    validations:
      required: false
