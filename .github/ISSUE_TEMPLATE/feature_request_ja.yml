name: 機能要望 (日本語)
description: MTermの新しい機能や改善案を提案します
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        機能要望ありがとうございます！
  - type: textarea
    id: problem
    attributes:
      label: 何らかの課題に関連する要望ですか？
      description: どのような問題があるか、明確で簡潔に記載してください。例: 〜する時にいつも不便に感じている、など
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 希望する解決策
      description: どのようになってほしいか、明確で簡潔に記載してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した代替の解決策や機能があれば記載してください。
    validations:
      required: false
